<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>系统公告 - NoSQLHub</title>

    <link rel="stylesheet" href="../css/navbar.css">

</head>

    <main class="announcement-container">

                    href="notifications.html"
