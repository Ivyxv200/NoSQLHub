<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>注册 - NoSQLHub</title>

    <!-- 导航栏 -->
    <link rel="stylesheet" href="../css/navbar.css">

    <!-- 页面CSS -->
    <link rel="stylesheet" href="../css/register.css">

</head>

<body>

    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <!-- 注册区域 -->

    <main class="register-container">

        <div class="register-card">

            <h1>
                用户注册
            </h1>

            <!-- 用户名 -->

            <div class="form-group">

                <label>
                    用户名
                </label>

                <input
                        type="text"
                        id="username"
                        placeholder="请输入用户名"
                >

            </div>

            <!-- 邮箱 -->

            <div class="form-group">

                <label>
                    邮箱
                </label>

                <input
                        type="email"
                        id="email"
                        placeholder="请输入邮箱"
                >

            </div>

            <!-- 密码 -->

            <div class="form-group">

                <label>
                    密码
                </label>

                <input
                        type="password"
                        id="password"
                        placeholder="请输入密码"
                >

            </div>

            <!-- 确认密码 -->

            <div class="form-group">

                <label>
                    确认密码
                </label>

                <input
                        type="password"
                        id="confirmPassword"
                        placeholder="请再次输入密码"
                >

            </div>

            <!-- 注册按钮 -->

            <button id="registerBtn">
                注册
            </button>

            <!-- 登录跳转 -->

            <div class="login-link">

                已有账号？

                <a href="login.html">
                    立即登录
                </a>

            </div>

        </div>

    </main>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/register.js"></script>

</body>

</html>
