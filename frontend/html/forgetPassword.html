<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>忘记密码 - NoSQLHub</title>

    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/forgetPassword.css">
</head>

<body>

    <div id="navbar-container"></div>

    <main class="forget-container">

        <div class="forget-card">

            <h1>
                找回密码
            </h1>

            <div class="form-group">
                <label>用户名</label>
                <input
                    type="text"
                    id="username"
                    placeholder="请输入用户名"
                >
            </div>

            <div class="form-group">
                <label>原密码</label>
                <input
                    type="password"
                    id="oldPassword"
                    placeholder="请输入原密码"
                >
            </div>

            <div class="form-group">
                <label>新密码</label>
                <input
                    type="password"
                    id="newPassword"
                    placeholder="请输入新密码"
                >
            </div>

            <div class="form-group">
                <label>确认新密码</label>
                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="请再次输入新密码"
                >
            </div>

            <button id="resetPasswordBtn">
                修改密码
            </button>

            <div class="back-login">
                想起来了？
                <a href="login.html">
                    返回登录
                </a>
            </div>

        </div>

    </main>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/forgetPassword.js"></script>

</body>

</html>
