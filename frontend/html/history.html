<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        历史浏览 - NoSQLHub
    </title>

    <!-- navbar -->
    <link
        rel="stylesheet"
        href="../css/navbar.css"
    >

    <!-- 页面 -->
    <link
        rel="stylesheet"
        href="../css/history.css"
    >

</head>

<body>

    <!-- 导航栏 -->
    <div id="navbar-container"></div>

    <!-- 页面主体 -->
    <main class="history-container">

        <!-- 标题 -->
        <div class="page-header">

            <h1>
                历史浏览
            </h1>

            <button id="clearBtn">
                清空记录
            </button>

        </div>

        <!-- 浏览列表 -->
        <div
            class="history-list"
            id="historyList"
        >
        </div>

        <!-- 分页 -->
        <div
            id="historyPagination"
            class="pagination"
        >
        </div>

    </main>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/history.js"></script>

</body>

</html>
